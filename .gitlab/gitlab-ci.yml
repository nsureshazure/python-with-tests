stages:
  - install
  - test
  - sonarqube
  - finish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  image: python:3.8

cache: &pip-cache
  paths:
    - .cache/pip
  key: pip-$CI_COMMIT_REF_SLUG

# -----------------------------------------------------------
# 📥 Install Dependencies
# -----------------------------------------------------------
install:
  stage: install
  script:
    - pip install -r requirements.txt
    - pip install .
    - pip install coverage pytest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# -----------------------------------------------------------
# 🧪 Run Tests
# -----------------------------------------------------------
test:
  stage: test
  needs: [install]
  script:
    - pip install -r requirements.txt
    - pip install .
    - pip install coverage pytest
    - coverage run -m pytest
    - coverage xml
  artifacts:
    paths:
      - .coverage
      - coverage.xml
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# -----------------------------------------------------------
# 🐳 Main Branch - SonarQube
# -----------------------------------------------------------
sonarqube-main:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli:latest
  needs: [test]
  script:
    - pip install -r requirements.txt
    - pip install .
    - sonar-scanner -Dsonar.token="$SONAR_TOKEN"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

sonarqube-main-finish:
  stage: finish
  needs: [sonarqube-main]
  script:
    - echo "Main branch scan finished"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# -----------------------------------------------------------
# 🐳 Feature Branch - SonarQube
# -----------------------------------------------------------
sonarqube-feature:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli:latest
  needs: [test]
  script:
    - pip install -r requirements.txt
    - pip install .
    - sonar-scanner -Dsonar.token="$SONAR_TOKEN"
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^feature\//

sonarqube-feature-finish:
  stage: finish
  needs: [sonarqube-feature]
  script:
    - echo "Feature branch scan finished"
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^feature\//

# -----------------------------------------------------------
# 🐳 Merge Request - SonarQube
# -----------------------------------------------------------
sonarqube-mr:
  stage: sonarqube
  image: sonarsource/sonar-scanner-cli:latest
  needs: [test]
  script:
    - pip install -r requirements.txt
    - pip install .
    - sonar-scanner -Dsonar.token="$SONAR_TOKEN"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

sonarqube-mr-finish:
  stage: finish
  needs: [sonarqube-mr]
  script:
    - echo "MR scan finished"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
